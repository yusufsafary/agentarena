<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CAFF00"/>
      <stop offset="100%" stop-color="#FF0080"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon (arena ring) -->
  <path d="M22 2 L40 12 L40 32 L22 42 L4 32 L4 12 Z" stroke="url(#g)" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Inner diamond arena floor -->
  <path d="M22 9 L31 19 L22 29 L13 19 Z" fill="url(#g)" opacity="0.12"/>

  <!-- Neural network nodes — 6 corners of inner hex -->
  <circle cx="22" cy="7"  r="2.8" fill="#CAFF00" filter="url(#glow)"/>
  <circle cx="33" cy="14" r="2.8" fill="url(#g)"  filter="url(#glow)"/>
  <circle cx="33" cy="28" r="2.8" fill="#FF0080"  filter="url(#glow)"/>
  <circle cx="22" cy="35" r="2.8" fill="#FF0080"  filter="url(#glow)"/>
  <circle cx="11" cy="28" r="2.8" fill="url(#g)"  filter="url(#glow)"/>
  <circle cx="11" cy="14" r="2.8" fill="#CAFF00"  filter="url(#glow)"/>

  <!-- Outer edge connections -->
  <line x1="22" y1="7"  x2="33" y2="14" stroke="#CAFF00" stroke-width="1.2" opacity="0.8"/>
  <line x1="33" y1="14" x2="33" y2="28" stroke="url(#g)"  stroke-width="1.2" opacity="0.8"/>
  <line x1="33" y1="28" x2="22" y2="35" stroke="#FF0080"  stroke-width="1.2" opacity="0.8"/>
  <line x1="22" y1="35" x2="11" y2="28" stroke="#FF0080"  stroke-width="1.2" opacity="0.8"/>
  <line x1="11" y1="28" x2="11" y2="14" stroke="url(#g)"  stroke-width="1.2" opacity="0.8"/>
  <line x1="11" y1="14" x2="22" y2="7"  stroke="#CAFF00"  stroke-width="1.2" opacity="0.8"/>

  <!-- Cross neural connections (AI brain) -->
  <line x1="22" y1="7"  x2="33" y2="28" stroke="url(#g)" stroke-width="0.8" opacity="0.35" stroke-dasharray="2.5,2.5"/>
  <line x1="11" y1="14" x2="33" y2="28" stroke="url(#g)" stroke-width="0.8" opacity="0.35" stroke-dasharray="2.5,2.5"/>
  <line x1="11" y1="28" x2="33" y2="14" stroke="url(#g)" stroke-width="0.8" opacity="0.35" stroke-dasharray="2.5,2.5"/>
  <line x1="22" y1="35" x2="11" y2="14" stroke="url(#g)" stroke-width="0.8" opacity="0.35" stroke-dasharray="2.5,2.5"/>

  <!-- Center pulse -->
  <circle cx="22" cy="21" r="4"   fill="url(#g)" opacity="0.25"/>
  <circle cx="22" cy="21" r="2.2" fill="url(#g)" opacity="0.6"/>
  <circle cx="22" cy="21" r="1"   fill="white"/>
</svg>
